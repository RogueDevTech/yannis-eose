---
# Prod environment variables — Yannis EOSE GCP prod VM.
# Mirror of dev.yml with prod hostnames + a fresh TLS contact.

env_name: prod

web_hostname: office.hqyannis.com
api_hostname: api-office.hqyannis.com

web_upstream_port: 3000
api_upstream_port: 4444

tls_contact_email: ops@hqyannis.com
# DNS is pointed at the prod VM IP (office + api-office, DNS-only / grey
# cloud on Cloudflare), so certbot HTTP-01 can issue. Idempotent — leave
# true after first successful issuance; certbot will skip re-issue while
# the cert is valid.
provision_tls_certificate: true

client_max_body_size: 50m
