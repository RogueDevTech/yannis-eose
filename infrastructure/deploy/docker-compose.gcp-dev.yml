services:
  api:
    image: ${IMAGE_REGISTRY}/yannis-eose-api:${IMAGE_TAG}
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=4444
    ports:
      - '127.0.0.1:4444:4444'
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://localhost:4444/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${IMAGE_REGISTRY}/yannis-eose-web:${IMAGE_TAG}
    env_file: .env
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4444
      - PUBLIC_API_URL=${PUBLIC_API_URL}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN}
      - PORT=3000
      - HOST=0.0.0.0
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      api:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    restart: always
