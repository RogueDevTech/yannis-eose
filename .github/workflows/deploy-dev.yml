name: Deploy to Dev (EC2)

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm turbo typecheck

      - name: Lint all packages
        run: pnpm turbo lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: dev-${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/yannis-eose-api:$IMAGE_TAG -t $ECR_REGISTRY/yannis-eose-api:dev-latest .
          docker push $ECR_REGISTRY/yannis-eose-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/yannis-eose-api:dev-latest

      - name: Build & push Web image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: dev-${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/yannis-eose-web:$IMAGE_TAG -t $ECR_REGISTRY/yannis-eose-web:dev-latest .
          docker push $ECR_REGISTRY/yannis-eose-web:$IMAGE_TAG
          docker push $ECR_REGISTRY/yannis-eose-web:dev-latest

      - name: Copy compose and nginx to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/deploy_key \
            infrastructure/deploy/docker-compose.prod.yml \
            infrastructure/nginx/nginx.conf \
            infrastructure/deploy/refresh-env.sh \
            ubuntu@${EC2_HOST}:/opt/yannis-eose/

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/yannis-eose
            export SECRET_NAME=${{ secrets.SECRET_NAME || 'yanis-eose' }}
            export AWS_REGION=${{ env.AWS_REGION }}
            chmod +x ./refresh-env.sh 2>/dev/null || true
            if [ -x ./refresh-env.sh ]; then ./refresh-env.sh; fi
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            export ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            export IMAGE_TAG=dev-${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 10
            curl -sf http://localhost:4444/health || (echo "API health check failed" && exit 1)
            curl -sf http://localhost:3000 || (echo "Web health check failed" && exit 1)
            docker image prune -f
