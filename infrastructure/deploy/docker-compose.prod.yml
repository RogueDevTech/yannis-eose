# ==============================================================================
# Yannis EOSE — Production Docker Compose (EC2)
# Uses pre-built images from ECR. Set on host: ECR_REGISTRY, IMAGE_TAG
# ==============================================================================

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-devredis}"]
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-devredis}', 'ping']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: ${ECR_REGISTRY}/yannis-eose-api:${IMAGE_TAG}
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devredis}@redis:6379
    ports:
      - '4444:4444'
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://localhost:4444/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ${ECR_REGISTRY}/yannis-eose-web:${IMAGE_TAG}
    env_file: .env
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4444
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://api-yannis.roguedevtech.com}
      - PORT=3000
      - HOST=0.0.0.0
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    restart: always

volumes:
  redis_data:
