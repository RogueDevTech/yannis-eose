name = "yannis-edge-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Default (AWS dev) env — `wrangler deploy` with no `--env` flag uses these.
# The form lives at `yannis-form.roguedevtech.com`; this worker handles every
# request to that hostname and posts orders to the AWS-hosted API. GCP dev /
# prod live on hqyannis.com under a different Cloudflare account (see the
# `[env.*]` blocks below, which DO pin `account_id`).
#
# `account_id` is intentionally NOT pinned here. Wrangler falls back to
# whichever account the active CLOUDFLARE_API_TOKEN is scoped to — which
# in CI is the roguedevtech.com account. To re-add the lock, paste the real
# account ID into a new `account_id = "…"` line (find via `wrangler whoami`).
routes = [
  { pattern = "yannis-form.roguedevtech.com/*", zone_name = "roguedevtech.com" },
]

[vars]
API_URL = "https://api-yannis.roguedevtech.com"
TURNSTILE_SITE_KEY = "0x4AAAAAACwS5uc-71js3fAy"


# Healer cron — checks API health every 60 seconds
[triggers]
crons = ["* * * * *"]

# KV namespaces — create with: wrangler kv:namespace create <NAME>
# Replace the placeholder IDs with real ones after creation

[[kv_namespaces]]
binding = "DEDUP_CACHE"
id = "dd6aa2365f7a44c5b0d3b4825bdb8749"
preview_id = "e73dc2a62c124f05b1029332b7596ac0"

[[kv_namespaces]]
binding = "RATE_LIMIT_CACHE"
id = "b68391c82d004c40a9f3dfd61fd49866"
preview_id = "47b3b79e86e0452eb202d54d883f41aa"

[[kv_namespaces]]
binding = "INVENTORY_CACHE"
id = "7ef0945b3f044e0280db399fdcc2cdb7"
preview_id = "4a79f1f5fe2541369c5d6c95a581f591"

[[kv_namespaces]]
binding = "CAMPAIGN_CACHE"
id = "7a4c4ff13803430fa1173674e88ff5b0"
preview_id = "36f748275dec4c669b6fe26dca9cf8db"

# ─── GCP dev env (hqyannis.com zone) ──────────────────────────────────────────
# Deploy with `pnpm --filter @yannis/edge-worker exec wrangler deploy --env gcp-dev`.
# Points form submissions at the GCP-hosted dev API. KV namespaces can be
# shared with the AWS dev worker since this is a dev env — change to fresh
# IDs if you want bleed-free counters between providers.

[env.gcp-dev]
name = "yannis-edge-worker-gcp-dev"
# Lives in the hqyannis.com Cloudflare account (Evercoresystemsltd@gmail.com)
# — separate from the AWS-dev worker (which is in the roguedevtech.com
# account). Workers, KV namespaces, and routes are all account-scoped; you
# cannot share them across accounts.
account_id = "39591257f05cdf9729f80952c61b4aec"
# Form is hosted at dev-form.hqyannis.com (separate from the web app at
# dev-office.hqyannis.com so the form has no session cookies in scope).
# Use the plural `routes = [...]` form to fully override the top-level
# `routes` (which targets roguedevtech.com in a different CF account).
routes = [
  { pattern = "dev-form.hqyannis.com/*", zone_name = "hqyannis.com" },
]

[env.gcp-dev.vars]
API_URL = "https://dev-api-office.hqyannis.com"
# Turnstile site `yannis-form-dev` in the hqyannis.com account, scoped to
# dev-form.hqyannis.com. The matching TURNSTILE_SECRET_KEY is stored as a
# Worker secret (see DEPLOY.md), not in this file.
TURNSTILE_SITE_KEY = "0x4AAAAAADRynbkd8QFbdKEC"

[env.gcp-dev.triggers]
crons = ["* * * * *"]

# KV namespaces — MUST be created in the hqyannis.com account. The AWS dev
# IDs above are in the roguedevtech.com account and will fail to bind here.
# Create with (after wrangler is authed to the new account):
#   wrangler kv namespace create DEDUP_CACHE        --env gcp-dev
#   wrangler kv namespace create RATE_LIMIT_CACHE   --env gcp-dev
#   wrangler kv namespace create INVENTORY_CACHE    --env gcp-dev
#   wrangler kv namespace create CAMPAIGN_CACHE     --env gcp-dev
# Then paste the printed IDs below.
[[env.gcp-dev.kv_namespaces]]
binding = "DEDUP_CACHE"
id = "851dff3f14cf450d96bc0ea97f3ece10"

[[env.gcp-dev.kv_namespaces]]
binding = "RATE_LIMIT_CACHE"
id = "cf30819e98de4f2c83544e54398d601f"

[[env.gcp-dev.kv_namespaces]]
binding = "INVENTORY_CACHE"
id = "fe9072441efe4b83b31953a776b1c213"

[[env.gcp-dev.kv_namespaces]]
binding = "CAMPAIGN_CACHE"
id = "09620716b9494f01a45a886d9a6ceb74"

# ─── Production env ───────────────────────────────────────────────────────────
# Deploy with `pnpm --filter @yannis/edge-worker exec wrangler deploy --env production`.
# Same worker code, different bindings — KV IDs must be created in the prod
# Cloudflare account and pasted here. TURNSTILE_SITE_KEY should be a prod
# Turnstile site (separate from dev) so abuse counters don't bleed across envs.

[env.production]
name = "yannis-edge-worker-prod"
# Lives in the same hqyannis.com Cloudflare account as `gcp-dev`. KV
# namespaces are separate from dev so prod abuse counters / dedup / rate
# limits don't bleed between envs.
account_id = "39591257f05cdf9729f80952c61b4aec"
# Prod form lives at form.hqyannis.com. The route is hostname-specific (not
# `*.hqyannis.com`) so the worker doesn't accidentally intercept requests to
# `office.hqyannis.com` (web) or `api-office.hqyannis.com` (api).
# Plural `routes = [...]` to fully override the top-level routes array.
routes = [
  { pattern = "form.hqyannis.com/*", zone_name = "hqyannis.com" },
]

[env.production.vars]
API_URL = "https://api-office.hqyannis.com"
TURNSTILE_SITE_KEY = "REPLACE-WITH-PROD-TURNSTILE-SITE-KEY"

[env.production.triggers]
crons = ["* * * * *"]

[[env.production.kv_namespaces]]
binding = "DEDUP_CACHE"
id = "REPLACE-WITH-PROD-DEDUP-KV-ID"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_CACHE"
id = "REPLACE-WITH-PROD-RATE-LIMIT-KV-ID"

[[env.production.kv_namespaces]]
binding = "INVENTORY_CACHE"
id = "REPLACE-WITH-PROD-INVENTORY-KV-ID"

[[env.production.kv_namespaces]]
binding = "CAMPAIGN_CACHE"
id = "REPLACE-WITH-PROD-CAMPAIGN-KV-ID"
