# Managed by Ansible — do not edit by hand.
#
# Loaded automatically by Ubuntu/Debian nginx via `include /etc/nginx/conf.d/*.conf`
# in the http {} context. Applies to every server block on this host.
#
# Restores the real client IP when Cloudflare proxies the request:
#   - `set_real_ip_from <range>` whitelists Cloudflare's edge networks.
#     Only requests originating from those ranges are trusted to carry
#     a `CF-Connecting-IP` header. Any other source claiming that header
#     is ignored — protects against spoofing if a request ever bypasses CF.
#   - `real_ip_header CF-Connecting-IP` tells nginx which header carries
#     the real client IP for trusted sources.
#   - `real_ip_recursive on` walks the chain back through trusted proxies
#     until it finds an untrusted source — that's the real client.
#
# Source: https://www.cloudflare.com/ips-v4 and https://www.cloudflare.com/ips-v6
# These ranges change rarely; refresh from the source if Cloudflare announces
# new networks.

