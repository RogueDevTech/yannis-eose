name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  # ── Build ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/build/
          retention-days: 1

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: apps/api/dist/
          retention-days: 1

  # ── Deploy to Staging (auto on push to main) ───────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/yannis-eose-api:$IMAGE_TAG -t $ECR_REGISTRY/yannis-eose-api:staging-latest .
          docker push $ECR_REGISTRY/yannis-eose-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/yannis-eose-api:staging-latest

      - name: Build & push Web image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/yannis-eose-web:$IMAGE_TAG -t $ECR_REGISTRY/yannis-eose-web:staging-latest .
          docker push $ECR_REGISTRY/yannis-eose-web:$IMAGE_TAG
          docker push $ECR_REGISTRY/yannis-eose-web:staging-latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/yannis-eose
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            export IMAGE_TAG=staging-${{ github.sha }}
            export ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            for i in $(seq 1 18); do
              if curl -sf http://localhost:4444/health >/dev/null && curl -sf http://localhost:3000 >/dev/null; then
                echo "Health checks passed."; break
              fi
              if [ "$i" -eq 18 ]; then
                docker compose -f docker-compose.prod.yml logs --tail=40 api
                docker compose -f docker-compose.prod.yml logs --tail=40 web
                exit 1
              fi
              sleep 5
            done
            docker image prune -f

  # ── Deploy to Production (manual approval) ─────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://yannis.roguedevtech.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: production-${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/yannis-eose-api:$IMAGE_TAG -t $ECR_REGISTRY/yannis-eose-api:production-latest .
          docker push $ECR_REGISTRY/yannis-eose-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/yannis-eose-api:production-latest

      - name: Build & push Web image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: production-${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/yannis-eose-web:$IMAGE_TAG -t $ECR_REGISTRY/yannis-eose-web:production-latest .
          docker push $ECR_REGISTRY/yannis-eose-web:$IMAGE_TAG
          docker push $ECR_REGISTRY/yannis-eose-web:production-latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/yannis-eose
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            export IMAGE_TAG=production-${{ github.sha }}
            export ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            for i in $(seq 1 18); do
              if curl -sf http://localhost:4444/health >/dev/null && curl -sf http://localhost:3000 >/dev/null; then
                echo "Health checks passed."; break
              fi
              if [ "$i" -eq 18 ]; then
                docker compose -f docker-compose.prod.yml logs --tail=40 api
                docker compose -f docker-compose.prod.yml logs --tail=40 web
                exit 1
              fi
              sleep 5
            done
            docker image prune -f

  # ── Deploy Edge Worker (on changes to edge-worker) ─────────────
  deploy-edge-worker:
    name: Deploy Edge Worker
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for edge-worker changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^apps/edge-worker/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare
        if: steps.changes.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @yannis/edge-worker exec wrangler deploy
