name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── Build ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/build/
          retention-days: 1

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: apps/api/dist/
          retention-days: 1

  # ── Deploy to Staging (auto on push to main) ───────────────────
  # Environment declaration removed — the deploy is disabled and the
  # `environment: staging` gate was causing CI failures (approval required
  # on a no-op job).
  deploy-staging:
    name: Staging Deploy Disabled
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: AWS staging deploy intentionally disabled
        run: |
          echo "Staging deploy is intentionally disabled."
          echo "The project is migrating away from AWS/EC2; implement the GCP staging/prod rollout before re-enabling auto-deploy from main."

  # ── Deploy to Production (manual approval) ─────────────────────
  deploy-production:
    name: Production Deploy Disabled
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: AWS production deploy intentionally disabled
        run: |
          echo "Production deploy is intentionally disabled."
          echo "The project is migrating away from AWS/EC2; implement the GCP production rollout before re-enabling main-branch deploys."

  # ── Deploy Edge Worker (on changes to edge-worker) ─────────────
  deploy-edge-worker:
    name: Deploy Edge Worker
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for edge-worker changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^apps/edge-worker/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare — AWS dev (roguedevtech.com account)
        if: steps.changes.outputs.changed == 'true'
        env:
          # Token scoped to the roguedevtech.com Cloudflare account. Targets
          # the top-level wrangler.toml config (worker `yannis-edge-worker`
          # at `yannis-form.roguedevtech.com/*`).
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm --filter @yannis/edge-worker exec wrangler deploy --env=""

      - name: Deploy to Cloudflare — GCP dev (hqyannis.com account)
        # Skipped silently when the hqyannis token isn't set yet — lets the
        # AWS deploy continue working even before the GCP CF account is
        # provisioned. Once the secret exists, the GCP-dev worker auto-deploys
        # alongside the AWS one on every relevant push.
        if: steps.changes.outputs.changed == 'true' && env.CLOUDFLARE_API_TOKEN_HQYANNIS != ''
        env:
          # Token scoped to the hqyannis.com Cloudflare account. Targets the
          # `[env.gcp-dev]` block (worker `yannis-edge-worker-gcp-dev` at
          # `dev-form.hqyannis.com/*`).
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_HQYANNIS }}
          CLOUDFLARE_API_TOKEN_HQYANNIS: ${{ secrets.CLOUDFLARE_API_TOKEN_HQYANNIS }}
        run: pnpm --filter @yannis/edge-worker exec wrangler deploy --env gcp-dev
