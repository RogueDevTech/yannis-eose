[defaults]
inventory = ./inventory.yml
host_key_checking = False
# YAML-formatted task output (replaces the removed community.general.yaml
# callback as of ansible-core 2.13 / community.general 12.0).
stdout_callback = default
callback_result_format = yaml
forks = 5
retry_files_enabled = False

[ssh_connection]
pipelining = True
