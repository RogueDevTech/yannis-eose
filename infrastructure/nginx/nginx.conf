# ==============================================================================
# Yannis EOSE — Nginx reverse proxy (EC2)
# Frontend: https://yannis.roguedevtech.com → web:3000
# Backend:  https://api-yannis.roguedevtech.com → api:4444
# Certbot SSL: /etc/letsencrypt/live/<domain>/
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:4444;
    }
    upstream web {
        server web:3000;
    }

    # --------------------------------------------------------------------------
    # HTTP → HTTPS redirect (and ACME challenge for certbot renewal)
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name yannis.roguedevtech.com api-yannis.roguedevtech.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --------------------------------------------------------------------------
    # Frontend — https://yannis.roguedevtech.com
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name yannis.roguedevtech.com;

        ssl_certificate     /etc/letsencrypt/live/yannis.roguedevtech.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yannis.roguedevtech.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # --------------------------------------------------------------------------
    # Backend API — https://api-yannis.roguedevtech.com
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name api-yannis.roguedevtech.com;

        ssl_certificate     /etc/letsencrypt/live/api-yannis.roguedevtech.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-yannis.roguedevtech.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        location /trpc {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        location /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }
        location /api {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
